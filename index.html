<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>مصحفي</title>
  <style>
    /* ═══════════════════════════════════════
       ROOT & THEMES
    ═══════════════════════════════════════ */
    :root {
      --bg: #f5f0e8;
      --text: #2c1a0e;
      --accent: #5a8a5a;
      --sidebar-bg: #ede5d0;
      --card-bg: #fdf6e3;
      --border: #c9b99a;
      --bottom-bg: #ede5d0;
      --shadow: rgba(0,0,0,0.15);
    }
    body.dark {
      --bg: #1a1a2e;
      --text: #e8d9c0;
      --accent: #6aaa6a;
      --sidebar-bg: #16213e;
      --card-bg: #0f3460;
      --border: #334466;
      --bottom-bg: #16213e;
      --shadow: rgba(0,0,0,0.5);
    }
    body.night {
      --bg: #0d0d0d;
      --text: #c8a96e;
      --accent: #c8a96e;
      --sidebar-bg: #111111;
      --card-bg: #1a1400;
      --border: #3a2e00;
      --bottom-bg: #111111;
      --shadow: rgba(0,0,0,0.7);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Amiri', 'Scheherazade New', serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s, color 0.3s;
      min-height: 100vh;
    }

    /* ═══════════════════════════════════════
       TOP NAVBAR
    ═══════════════════════════════════════ */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: var(--sidebar-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 200;
      box-shadow: 0 2px 8px var(--shadow);
    }
    .navbar .logo {
      font-size: 1.4rem;
      font-weight: bold;
      color: var(--accent);
    }
    .navbar .nav-btns {
      display: flex;
      gap: 8px;
    }
    .navbar button {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    .navbar button:hover, .navbar button.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* ═══════════════════════════════════════
       LAYOUT
    ═══════════════════════════════════════ */
    .layout {
      display: flex;
      margin-top: 56px;
      margin-bottom: 80px;
      min-height: calc(100vh - 136px);
    }

    /* ═══════════════════════════════════════
       SIDEBAR
    ═══════════════════════════════════════ */
    .sidebar {
      width: 260px;
      background: var(--sidebar-bg);
      border-left: 1px solid var(--border);
      position: fixed;
      top: 56px;
      right: 0;
      bottom: 80px;
      overflow-y: auto;
      transform: translateX(0);
      transition: transform 0.3s ease;
      z-index: 100;
    }
    .sidebar.closed {
      transform: translateX(100%);
    }
    .sidebar-header {
      padding: 12px 16px;
      font-size: 1rem;
      font-weight: bold;
      border-bottom: 1px solid var(--border);
      background: var(--sidebar-bg);
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .sidebar-search {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-search input {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card-bg);
      color: var(--text);
      font-size: 0.9rem;
    }
    .surah-list {
      list-style: none;
    }
    .surah-item {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
      gap: 10px;
    }
    .surah-item:hover { background: var(--card-bg); }
    .surah-item.active {
      background: var(--accent);
      color: #fff;
    }
    .surah-num {
      width: 28px;
      height: 28px;
      background: var(--accent);
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      flex-shrink: 0;
    }
    .surah-item.active .surah-num {
      background: #fff;
      color: var(--accent);
    }
    .surah-info { flex: 1; }
    .surah-name { font-size: 1rem; font-weight: bold; }
    .surah-meta { font-size: 0.75rem; opacity: 0.7; }
    .surah-ayas { font-size: 0.8rem; opacity: 0.8; }

    /* ═══════════════════════════════════════
       MAIN CONTENT
    ═══════════════════════════════════════ */
    .main {
      flex: 1;
      margin-right: 260px;
      padding: 20px 16px;
      transition: margin-right 0.3s;
    }
    .main.full { margin-right: 0; }

    /* Settings bar */
    .settings-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
      padding: 12px 16px;
      background: var(--card-bg);
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .settings-bar label { font-size: 0.85rem; opacity: 0.8; }
    .settings-bar select, .settings-bar input {
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 0.85rem;
    }
    .theme-btns { display: flex; gap: 6px; }
    .theme-btn {
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      background: var(--bg);
      color: var(--text);
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    .theme-btn:hover, .theme-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .font-controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .font-controls button {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .font-size-val { font-size: 0.85rem; min-width: 36px; text-align: center; }

    /* Page jump */
    .page-jump {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .page-jump input {
      width: 60px;
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      text-align: center;
    }
    .page-jump button {
      padding: 4px 10px;
      border: 1px solid var(--accent);
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-size: 0.85rem;
    }

    /* Quran page display */
    .quran-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px 20px;
      box-shadow: 0 4px 16px var(--shadow);
      min-height: 400px;
    }
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      font-size: 0.85rem;
      opacity: 0.7;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }
    .quran-text {
      font-size: 1.9rem;
      line-height: 2.2;
      text-align: center;
      direction: rtl;
      font-family: 'Amiri Quran', 'Amiri', serif;
    }
    .ayah {
      display: inline;
    }
    .ayah-num {
      display: inline-block;
      font-size: 0.75em;
      color: var(--accent);
      margin: 0 4px;
    }
    .translation-text {
      margin-top: 16px;
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--text);
      opacity: 0.75;
      border-top: 1px solid var(--border);
      padding-top: 12px;
      direction: ltr;
      text-align: left;
    }
    .loading {
      text-align: center;
      padding: 40px;
      font-size: 1.2rem;
      opacity: 0.6;
    }

    /* Bookmarks panel */
    .bookmarks-panel {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .bookmarks-panel h3 {
      margin-bottom: 10px;
      color: var(--accent);
    }
    .bookmark-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .bookmark-item button {
      padding: 3px 8px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .btn-go { background: var(--accent); color: #fff; margin-left: 6px; }
    .btn-del { background: #c0392b; color: #fff; }

    /* ═══════════════════════════════════════
       BOTTOM BAR
    ═══════════════════════════════════════ */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      background: var(--bottom-bg);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 200;
      box-shadow: 0 -2px 10px var(--shadow);
      transition: transform 0.35s ease;
    }
    .bottom-bar.hidden {
      transform: translateY(100%);
    }
    .show-bar-btn {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 201;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 6px 16px;
      cursor: pointer;
      font-size: 0.85rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .show-bar-btn.visible {
      opacity: 1;
      pointer-events: all;
    }

    .page-nav {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .page-nav button {
      width: 40px;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      font-size: 1.1rem;
      transition: background 0.2s;
    }
    .page-nav button:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .page-info { font-size: 0.9rem; text-align: center; min-width: 80px; }
    .page-info span { display: block; font-size: 0.75rem; opacity: 0.7; }

    .audio-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .audio-controls button {
      width: 40px;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
    }
    .audio-controls button:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .audio-controls button.playing { background: var(--accent); color: #fff; }

    .bookmark-btn {
      padding: 8px 14px;
      border: 1px solid var(--accent);
      border-radius: 10px;
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    .bookmark-btn:hover { background: var(--accent); color: #fff; }

    /* Responsive */
    @media (max-width: 768px) { 
      .sidebar { width: 100%; }
      .main { margin-right: 0; }
      .settings-bar { flex-direction: column; align-items: flex-start; }
    }
  </style>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:wght@400;700&display=swap" rel="stylesheet"/>



</head>
<body class="light">

<!-- TOP NAVBAR -->
<nav class="navbar">
  <div class="logo">🕌 مصحفي</div>
  <div class="nav-btns">
    <button onclick="showView('read')" id="btn-read" class="active">📖 قراءة</button>
    <button onclick="showView('bookmarks')" id="btn-bookmarks">🔖 حفظ</button>
    <button onclick="toggleSidebar()" id="btn-surah">📋 السور</button>
  </div>
</nav>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->

      <input type="text" id="surahSearch" placeholder="🔍 ابحث عن سورة..." oninput="filterSurahs()" />
    </div>
    <ul class="surah-list" id="surahList"></ul>
  </aside>

  <!-- MAIN -->
  <main class="main" id="main">

    <!-- SETTINGS BAR -->
    <div class="settings-bar">
      <!-- Theme -->
      <div>
        <label>المظهر:</label>
        <div class="theme-btns">
          <button class="theme-btn active" onclick="setTheme('light', this)">☀️ فاتح</button>
          <button class="theme-btn" onclick="setTheme('dark', this)">🌙 داكن</button>
          <button class="theme-btn" onclick="setTheme('night', this)">🕯️ ليلي</button>
        </div>
      </div>

      <!-- Font -->
      <div>
        <label>حجم الخط:</label>
        <div class="font-controls">
          <button onclick="changeFont(-0.1)">A−</button>
          <span class="font-size-val" id="fontVal">1.9</span>
          <button onclick="changeFont(0.1)">A+</button>
        </div>
      </div>

      <!-- Translation -->
      <div>
        <label>الترجمة:</label>
        <select id="translationSelect" onchange="loadCurrentPage()">
          <option value="en">🇬🇧 English</option>
          <option value="fr">🇫🇷 Français</option>
          <option value="ur">🇵🇰 اردو</option>
          <option value="tr">🇹🇷 Türkçe</option>
          <option value="none">— بدون —</option>
        </select>
      </div>

      <!-- Reciter -->
      <div>
        <label>القارئ:</label>
        <select id="reciterSelect">
          <option value="ar.alafasy">مشاري العفاسي</option>
          <option value="ar.abdulbasitmurattal">عبد الباسط</option>
          <option value="ar.abdurrahmaansudais">السديس</option>
          <option value="ar.husary">الحصري</option>
          <option value="ar.minshawi">المنشاوي</option>
        </select>
      </div>

      <!-- Page jump -->
      <div>
        <label>انتقل لصفحة:</label>
        <div class="page-jump">
          <input type="number" id="pageJumpInput" min="1" max="604" placeholder="1-604"/>
          <button onclick="jumpToPage()">اذهب ▶</button>
        </div>
      </div>
    </div>

    <!-- READ VIEW -->
    <div id="view-read">
      <div class="quran-card">
        <div class="page-header">
          <span id="juzLabel">الجزء 1</span>
          <span id="pageLabel">صفحة 1 / 604</span>
          <span id="surahLabel">سورة الفاتحة</span>
        </div>
        <div class="quran-text" id="quranText">
          <div class="loading">⏳ جارٍ التحميل...</div>
        </div>
        <div class="translation-text" id="translationText"></div>
      </div>
    </div>

    <!-- BOOKMARKS VIEW -->
    <div id="view-bookmarks" style="display:none;">
      <div class="bookmarks-panel">
        <h3>🔖 علاماتي المرجعية</h3>
        <div id="bookmarksList"><p style="opacity:0.6">لا توجد علامات بعد.</p></div>
      </div>
    </div>

  </main>
</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar" id="bottomBar">
  <!-- Page navigation -->
  <div class="page-nav">
    <button onclick="changePage(1)" title="الصفحة التالية">▶</button>
    <div class="page-info">
      <strong id="pageNum">1</strong>
      <span>من 604</span>
    </div>
    <button onclick="changePage(-1)" title="الصفحة السابقة">◀</button>
  </div>

  <!-- Audio controls -->
  <div class="audio-controls">
    <button onclick="stopAudio()" title="إيقاف">⏹</button>
    <button onclick="togglePlay()" id="playBtn" title="تشغيل">▶️</button>
    <button onclick="nextAyah()" title="التالية">⏭</button>
  </div>

  <!-- Bookmark -->
  <button class="bookmark-btn" onclick="addBookmark()">🔖 حفظ الموضع</button>
</div>

<!-- Show bar button (appears when bottom bar hidden) -->
<button class="show-bar-btn" id="showBarBtn" onclick="showBottomBar()">▲ أظهر الشريط</button>

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let currentPage = 1;
let currentSurah = 1;
let fontSize = 1.9;
let bookmarks = JSON.parse(localStorage.getItem('quran_bookmarks') || '[]');
let audio = null;
let isPlaying = false;
let currentAyah = 1;
let pageAyahs = [];

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  buildSurahList();
  loadPage(1);
  renderBookmarks();
  initScrollHide();
});

// ═══════════════════════════════════════════════════
//  SIDEBAR
// ═══════════════════════════════════════════════════
function buildSurahList(filter = '') {
  const list = document.getElementById('surahList');
  list.innerHTML = '';
  SURAHS.filter(s =>
    s.name.includes(filter) || s.eng.toLowerCase().includes(filter.toLowerCase()) || String(s.n).includes(filter)
  ).forEach(s => {
    const li = document.createElement('li');
    li.className = 'surah-item' + (s.n === currentSurah ? ' active' : '');
    li.innerHTML = `
      <div class="surah-num">${s.n}</div>
      <div class="surah-info">
        <div class="surah-name">${s.name}</div>
        <div class="surah-meta">${s.eng} · ${s.type}</div>
      </div>
      <div class="surah-ayas">${s.ayat} آية</div>`;
    li.onclick = () => goToSurah(s.n);
    list.appendChild(li);
  });
}

function filterSurahs() {
  buildSurahList(document.getElementById('surahSearch').value);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('closed');
  document.getElementById('main').classList.toggle('full');
}

// ═══════════════════════════════════════════════════
//  PAGE LOADING
// ═══════════════════════════════════════════════════
async function loadPage(pageNum) {
  currentPage = Math.max(1, Math.min(604, pageNum));
  document.getElementById('pageNum').textContent = currentPage;
  document.getElementById('pageLabel').textContent = `صفحة ${currentPage} / 604`;
  document.getElementById('pageJumpInput').value = currentPage;

  // Find current surah
  let surah = SURAHS.filter(s => s.page <= currentPage).pop();
  if (surah) {
    currentSurah = surah.n;
    document.getElementById('surahLabel').textContent = `سورة ${surah.name}`;
  }

  // Juz calculation (approximate)
  const juz = Math.ceil(currentPage / 20.13);
  document.getElementById('juzLabel').textContent = `الجزء ${Math.min(30, juz)}`;

  // Highlight active surah in sidebar
  document.querySelectorAll('.surah-item').forEach(el => el.classList.remove('active'));
  const items = document.querySelectorAll('.surah-item');
  if (items[currentSurah - 1]) items[currentSurah - 1].classList.add('active');

  // Load ayahs for this page via Quran API
  document.getElementById('quranText').innerHTML = '<div class="loading">⏳ جارٍ التحميل...</div>';
  document.getElementById('translationText').innerHTML = '';

  try {
    // Get ayahs for this page
    const res = await fetch(`https://api.alquran.cloud/v1/page/${currentPage}/quran-uthmani`);
    const data = await res.json();
    if (data.status !== 'OK') throw new Error();

    pageAyahs = data.data.ayahs;
    currentAyah = 0;

    let html = '';
    let lastSurah = null;
    pageAyahs.forEach(ayah => {
      if (ayah.surah.number !== lastSurah) {
        if (ayah.surah.number !== 1 && ayah.number !== 1) {
          html += `<div style="text-align:center;color:var(--accent);font-size:0.8em;padding:8px 0;border-top:1px solid var(--border);margin:8px 0">
            ﷽ سورة ${ayah.surah.name}</div>`;
        }
        lastSurah = ayah.surah.number;
      }
      html += `<span class="ayah" data-index="${pageAyahs.indexOf(ayah)}">${ayah.text}
        <span class="ayah-num">﴿${toArabicNum(ayah.numberInSurah)}﴾</span> </span>`;
    });
    document.getElementById('quranText').innerHTML = html;
    document.getElementById('quranText').style.fontSize = fontSize + 'rem';

    // Load translation
    loadTranslation();

    // Save to localStorage
    localStorage.setItem('quran_lastPage', currentPage);

  } catch(e) {
    document.getElementById('quranText').innerHTML =
      '<div class="loading">⚠️ تعذّر التحميل. تحقق من الاتصال بالإنترنت.</div>';
  }
}

async function loadTranslation() {
  const lang = document.getElementById('translationSelect').value;
  if (lang === 'none') { document.getElementById('translationText').innerHTML = ''; return; }

  const editions = {
    en: 'en.sahih',
    fr: 'fr.hamidullah',
    ur: 'ur.jalandhry',
    tr: 'tr.diyanet'
  };

  try {
    const res = await fetch(`https://api.alquran.cloud/v1/page/${currentPage}/${editions[lang]}`);
    const data = await res.json();
    if (data.status !== 'OK') return;
    const texts = data.data.ayahs.map(a => `(${a.numberInSurah}) ${a.text}`).join(' ');
    document.getElementById('translationText').innerHTML = texts;
  } catch(e) {}
}

function loadCurrentPage() { loadPage(currentPage); }

// ═══════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════
function changePage(dir) {
  stopAudio();
  loadPage(currentPage + dir);
}

function jumpToPage() {
  const val = parseInt(document.getElementById('pageJumpInput').value);
  if (val >= 1 && val <= 604) loadPage(val);
}

function goToSurah(n) {
  const s = SURAHS.find(x => x.n === n);
  if (s) {
    stopAudio();
    loadPage(s.page);
    // on mobile close sidebar
    if (window.innerWidth < 768) toggleSidebar();
  }
}

// ═══════════════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════════════
function getReciter() {
  return document.getElementById('reciterSelect').value;
}

async function togglePlay() {
  if (isPlaying) { pauseAudio(); return; }
  if (!pageAyahs.length) return;
  playAyah(currentAyah);
}

function playAyah(index) {
  if (index >= pageAyahs.length) { stopAudio(); return; }
  stopAudio();
  const ayah = pageAyahs[index];
  const reciter = getReciter();
  const url = `https://cdn.islamic.network/quran/audio/128/${reciter}/${ayah.number}.mp3`;
  audio = new Audio(url);
  audio.play();
  isPlaying = true;
  currentAyah = index;
  document.getElementById('playBtn').classList.add('playing');
  document.getElementById('playBtn').textContent = '⏸';

  // Highlight current ayah
  document.querySelectorAll('.ayah').forEach(el => el.style.background = '');
  const el = document.querySelector(`[data-index="${index}"]`);
  if (el) { el.style.background = 'var(--accent)'; el.style.color = '#fff'; el.style.borderRadius = '4px'; }

  audio.onended = () => { playAyah(index + 1); };
  audio.onerror = () => { playAyah(index + 1); };
}

function pauseAudio() {
  if (audio) audio.pause();
  isPlaying = false;
  document.getElementById('playBtn').classList.remove('playing');
  document.getElementById('playBtn').textContent = '▶️';
}

function stopAudio() {
  if (audio) { audio.pause(); audio.src = ''; audio = null; }
  isPlaying = false;
  document.getElementById('playBtn').classList.remove('playing');
  document.getElementById('playBtn').textContent = '▶️';
  document.querySelectorAll('.ayah').forEach(el => { el.style.background = ''; el.style.color = ''; });
}

function nextAyah() {
  if (isPlaying) playAyah(currentAyah + 1);
  else { currentAyah = Math.min(currentAyah + 1, pageAyahs.length - 1); }
}

// ═══════════════════════════════════════════════════
//  BOOKMARKS
// ═══════════════════════════════════════════════════
function addBookmark() {
  const surah = SURAHS.find(s => s.n === currentSurah);
  const bm = { page: currentPage, surah: surah ? surah.name : '', time: new Date().toLocaleDateString('ar') };
  bookmarks.unshift(bm);
  if (bookmarks.length > 20) bookmarks.pop();
  localStorage.setItem('quran_bookmarks', JSON.stringify(bookmarks));
  renderBookmarks();
  alert(`✅ تم حفظ الموضع: صفحة ${currentPage}`);
}

function renderBookmarks() {
  const el = document.getElementById('bookmarksList');
  if (!bookmarks.length) { el.innerHTML = '<p style="opacity:0.6">لا توجد علامات بعد.</p>'; return; }
  el.innerHTML = bookmarks.map((b, i) => `
    <div class="bookmark-item">
      <span>📄 صفحة ${b.page} — سورة ${b.surah} <small>(${b.time})</small></span>
      <div>
        <button class="btn-go" onclick="loadPage(${b.page});showView('read')">اذهب</button>
        <button class="btn-del" onclick="deleteBookmark(${i})">✕</button>
      </div>
    </div>`).join('');
}

function deleteBookmark(i) {
  bookmarks.splice(i, 1);
  localStorage.setItem('quran_bookmarks', JSON.stringify(bookmarks));
  renderBookmarks();
}

// ═══════════════════════════════════════════════════
//  VIEWS
// ═══════════════════════════════════════════════════
function showView(name) {
  document.getElementById('view-read').style.display = name === 'read' ? '' : 'none';
  document.getElementById('view-bookmarks').style.display = name === 'bookmarks' ? '' : 'none';
  document.querySelectorAll('.navbar .nav-btns button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + name).classList.add('active');
}

// ═══════════════════════════════════════════════════
//  THEME & FONT
// ═══════════════════════════════════════════════════
function setTheme(theme, btn) {
  document.body.className = theme;
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function changeFont(delta) {
  fontSize = Math.max(1.0, Math.min(3.5, +(fontSize + delta).toFixed(1)));
  document.getElementById('fontVal').textContent = fontSize.toFixed(1);
  document.getElementById('quranText').style.fontSize = fontSize + 'rem';
}

// ═══════════════════════════════════════════════════
//  AUTO-HIDE BOTTOM BAR ON SCROLL
// ═══════════════════════════════════════════════════
function initScrollHide() {
  const bar = document.getElementById('bottomBar');
  const showBtn = document.getElementById('showBarBtn');
  let lastY = window.scrollY;
  let timer = null;

  window.addEventListener('scroll', () => {
    const y = window.scrollY;
    if (y > lastY && y > 80) {
      bar.classList.add('hidden');
      showBtn.classList.add('visible');
    } else {
      bar.classList.remove('hidden');
      showBtn.classList.remove('visible');
    }
    lastY = y;

    // Auto-show after 3s of no scrolling
    clearTimeout(timer);
    timer = setTimeout(() => {
      bar.classList.remove('hidden');
      showBtn.classList.remove('visible');
    }, 3000);
  });
}

function showBottomBar() {
  document.getElementById('bottomBar').classList.remove('hidden');
  document.getElementById('showBarBtn').classList.remove('visible');
}

// ═══════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════
function toArabicNum(n) {
  return String(n).replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
}
